<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <style>
    text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:36px;font-weight:700}.label{font-size:20px}.uc{fill:#fff;stroke:#0f2f6f;stroke-width:3}.actor{stroke:#0f2f6f;stroke-width:4;fill:none}.line{stroke:#0f2f6f;stroke-width:3}
  </style>
  <text x="600" y="55" text-anchor="middle" class="title">Use Case Diagram</text>
