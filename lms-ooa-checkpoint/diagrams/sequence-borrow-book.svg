<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f2f6f"/></marker></defs>
  <style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.head{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.line{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 6}.msg{stroke:#0f2f6f;stroke-width:2;marker-end:url(#arrow)}.label{font-size:16px}.hlabel{font-size:18px;font-weight:700}</style>
  <text x="600" y="45" text-anchor="middle" class="title">Sequence Diagram: Borrow / Issue Book</text>
  <g>
    <rect x="45" y="80" width="130" height="45" rx="8" class="head"/><text x="110" y="108" text-anchor="middle" class="hlabel">Librarian</text>
    <rect x="210" y="80" width="150" height="45" rx="8" class="head"/><text x="285" y="108" text-anchor="middle" class="hlabel">UI</text>
    <rect x="405" y="80" width="150" height="45" rx="8" class="head"/><text x="480" y="108" text-anchor="middle" class="hlabel">Library</text>
    <rect x="600" y="80" width="150" height="45" rx="8" class="head"/><text x="675" y="108" text-anchor="middle" class="hlabel">Catalog</text>
    <rect x="795" y="80" width="130" height="45" rx="8" class="head"/><text x="860" y="108" text-anchor="middle" class="hlabel">Book</text>
    <rect x="970" y="80" width="150" height="45" rx="8" class="head"/><text x="1045" y="108" text-anchor="middle" class="hlabel">Member</text>
  </g>
  <line x1="110" y1="125" x2="110" y2="720" class="line"/><line x1="285" y1="125" x2="285" y2="720" class="line"/><line x1="480" y1="125" x2="480" y2="720" class="line"/><line x1="675" y1="125" x2="675" y2="720" class="line"/><line x1="860" y1="125" x2="860" y2="720" class="line"/><line x1="1045" y1="125" x2="1045" y2="720" class="line"/>
  <line x1="110" y1="170" x2="285" y2="170" class="msg"/><text x="125" y="160" class="label">Select member and book</text>
  <line x1="285" y1="230" x2="480" y2="230" class="msg"/><text x="305" y="220" class="label">issueBook(bookId, memberId)</text>
  <line x1="480" y1="290" x2="675" y2="290" class="msg"/><text x="505" y="280" class="label">findById(bookId)</text>
  <line x1="675" y1="350" x2="480" y2="350" class="msg"/><text x="540" y="340" class="label">Book found</text>
  <line x1="480" y1="410" x2="860" y2="410" class="msg"/><text x="565" y="400" class="label">isAvailable()</text>
  <line x1="480" y1="470" x2="1045" y2="470" class="msg"/><text x="655" y="460" class="label">canBorrow()</text>
  <line x1="480" y1="530" x2="860" y2="530" class="msg"/><text x="565" y="520" class="label">markIssued()</text>
  <line x1="480" y1="590" x2="1045" y2="590" class="msg"/><text x="600" y="580" class="label">add borrowed book</text>
  <line x1="480" y1="650" x2="285" y2="650" class="msg"/><text x="325" y="640" class="label">BorrowTransaction + due date</text>
  <line x1="285" y1="700" x2="110" y2="700" class="msg"/><text x="125" y="690" class="label">Show success</text>
</svg>
