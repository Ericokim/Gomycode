<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#123f82"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
      .title{font-size:36px;font-weight:700}
      .layer-title{font-size:26px;font-weight:700}
      .box-text{font-size:20px}
      .layer{fill:#f8fbff;stroke-width:3}
      .small{fill:#fff;stroke-width:2}
    </style>
  </defs>
  <text x="600" y="55" text-anchor="middle" class="title">System Architecture Diagram</text>

  <rect x="90" y="90" width="900" height="155" rx="14" class="layer" stroke="#2563eb"/>
  <text x="540" y="130" text-anchor="middle" class="layer-title" fill="#174a9c">Presentation Layer (UI)</text>
  <rect x="130" y="160" width="180" height="55" rx="8" class="small" stroke="#2563eb"/>
  <text x="220" y="195" text-anchor="middle" class="box-text">Search / Catalog</text>
  <rect x="350" y="160" width="180" height="55" rx="8" class="small" stroke="#2563eb"/>
  <text x="440" y="195" text-anchor="middle" class="box-text">Borrow / Return</text>
  <rect x="570" y="160" width="170" height="55" rx="8" class="small" stroke="#2563eb"/>
  <text x="655" y="195" text-anchor="middle" class="box-text">Reservations</text>
  <rect x="780" y="160" width="170" height="55" rx="8" class="small" stroke="#2563eb"/>
  <text x="865" y="195" text-anchor="middle" class="box-text">Admin Reports</text>

  <line x1="540" y1="245" x2="540" y2="295" stroke="#123f82" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="90" y="305" width="900" height="175" rx="14" class="layer" fill="#f2fbf4" stroke="#24713a"/>
  <text x="540" y="350" text-anchor="middle" class="layer-title" fill="#17612d">Business Logic Layer</text>
  <rect x="120" y="390" width="150" height="55" rx="8" class="small" stroke="#24713a"/>
  <text x="195" y="425" text-anchor="middle" class="box-text">Book Service</text>
  <rect x="300" y="390" width="160" height="55" rx="8" class="small" stroke="#24713a"/>
  <text x="380" y="425" text-anchor="middle" class="box-text">Member Service</text>
  <rect x="490" y="390" width="150" height="55" rx="8" class="small" stroke="#24713a"/>
  <text x="565" y="425" text-anchor="middle" class="box-text">Loan Service</text>
  <rect x="670" y="390" width="185" height="55" rx="8" class="small" stroke="#24713a"/>
  <text x="762" y="425" text-anchor="middle" class="box-text">Reservation Service</text>
  <rect x="875" y="390" width="95" height="55" rx="8" class="small" stroke="#24713a"/>
  <text x="922" y="425" text-anchor="middle" class="box-text">Reports</text>

  <rect x="1025" y="365" width="145" height="90" rx="10" fill="#faf5ff" stroke="#7e22ce" stroke-width="3"/>
  <text x="1098" y="400" text-anchor="middle" class="box-text">Notification</text>
  <text x="1098" y="428" text-anchor="middle" class="box-text">Service</text>
  <line x1="990" y1="415" x2="1020" y2="415" stroke="#123f82" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="540" y1="480" x2="540" y2="530" stroke="#123f82" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="90" y="540" width="900" height="115" rx="14" class="layer" fill="#fffaf0" stroke="#b7791f"/>
  <text x="540" y="582" text-anchor="middle" class="layer-title" fill="#8a5a00">Data Access Layer</text>
  <rect x="380" y="605" width="320" height="42" rx="8" class="small" stroke="#b7791f"/>
  <text x="540" y="633" text-anchor="middle" class="box-text">Repositories / DAOs</text>

  <line x1="540" y1="655" x2="540" y2="700" stroke="#123f82" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="90" y="710" width="900" height="85" rx="14" class="layer" stroke="#2563eb"/>
  <text x="540" y="740" text-anchor="middle" class="layer-title" fill="#174a9c">Database</text>
  <text x="210" y="775" text-anchor="middle" class="box-text">Books</text>
  <text x="380" y="775" text-anchor="middle" class="box-text">Members</text>
  <text x="540" y="775" text-anchor="middle" class="box-text">Loans</text>
  <text x="710" y="775" text-anchor="middle" class="box-text">Reservations</text>
  <text x="870" y="775" text-anchor="middle" class="box-text">Users</text>
</svg>
