<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <style>
    text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.entity-title{font-size:22px;font-weight:700}.body{font-size:17px}.entity{fill:#f8fbff;stroke:#2563eb;stroke-width:3}.line{stroke:#111827;stroke-width:3;fill:none}.rel{font-size:16px;fill:#374151}
  </style>
  <text x="550" y="50" text-anchor="middle" class="title">Data Model / ERD</text>

  <g transform="translate(60,110)">
    <rect width="250" height="180" rx="8" class="entity"/><line x1="0" y1="45" x2="250" y2="45" class="line"/>
    <text x="125" y="30" text-anchor="middle" class="entity-title">BOOK</text>
    <text x="18" y="75" class="body">id (PK)</text><text x="18" y="100" class="body">title, author, isbn</text><text x="18" y="125" class="body">genre</text><text x="18" y="150" class="body">status</text>
  </g>
  <g transform="translate(60,430)">
    <rect width="250" height="180" rx="8" class="entity"/><line x1="0" y1="45" x2="250" y2="45" class="line"/>
    <text x="125" y="30" text-anchor="middle" class="entity-title">MEMBER</text>
    <text x="18" y="75" class="body">id (PK)</text><text x="18" y="100" class="body">name, email</text><text x="18" y="125" class="body">phone</text><text x="18" y="150" class="body">borrowLimit</text>
  </g>
  <g transform="translate(430,110)">
    <rect width="290" height="205" rx="8" class="entity"/><line x1="0" y1="45" x2="290" y2="45" class="line"/>
    <text x="145" y="30" text-anchor="middle" class="entity-title">BORROW_TRANSACTION</text>
    <text x="18" y="75" class="body">id (PK)</text><text x="18" y="100" class="body">bookId (FK)</text><text x="18" y="125" class="body">memberId (FK)</text><text x="18" y="150" class="body">borrowDate, dueDate</text><text x="18" y="175" class="body">returnDate, status</text>
  </g>
  <g transform="translate(430,430)">
    <rect width="290" height="180" rx="8" class="entity"/><line x1="0" y1="45" x2="290" y2="45" class="line"/>
    <text x="145" y="30" text-anchor="middle" class="entity-title">RESERVATION</text>
    <text x="18" y="75" class="body">id (PK)</text><text x="18" y="100" class="body">bookId (FK)</text><text x="18" y="125" class="body">memberId (FK)</text><text x="18" y="150" class="body">reservedOn, status</text>
  </g>
  <g transform="translate(820,275)">
    <rect width="230" height="170" rx="8" class="entity"/><line x1="0" y1="45" x2="230" y2="45" class="line"/>
    <text x="115" y="30" text-anchor="middle" class="entity-title">USER</text>
    <text x="18" y="75" class="body">id (PK)</text><text x="18" y="100" class="body">username</text><text x="18" y="125" class="body">role</text><text x="18" y="150" class="body">permissions</text>
  </g>

  <line x1="310" y1="190" x2="430" y2="190" class="line"/><text x="338" y="170" class="rel">1 to many loans</text>
  <line x1="310" y1="520" x2="430" y2="520" class="line"/><text x="328" y="500" class="rel">1 to many holds</text>
  <line x1="185" y1="430" x2="555" y2="315" class="line"/><text x="290" y="365" class="rel">member borrows</text>
  <line x1="185" y1="290" x2="555" y2="430" class="line"/><text x="285" y="330" class="rel">book reserved</text>
  <line x1="720" y1="520" x2="820" y2="385" class="line"/><text x="740" y="470" class="rel">user role</text>
</svg>
